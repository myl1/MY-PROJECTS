<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机指挥调度系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        :root {
            --bg-base: #121212;
            --bg-panel: #1e1e2f;
            --bg-card: #27293d;
            --text-main: #ffffff;
            --text-sub: #9a9a9a;
            --theme-blue: #3388ff;
            --status-ok: #00f2c3;
            --status-warn: #ff8d72;
            --status-err: #fd5d93;
            --border-color: #2b2b40;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-base); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- 新增：登录界面的遮罩层和弹窗样式 --- */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: opacity 0.5s; }
        .login-box { background: var(--bg-panel); padding: 40px; border-radius: 8px; border: 1px solid var(--border-color); width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .login-title { margin-bottom: 25px; color: var(--theme-blue); text-align: center; font-size: 1.5rem; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; }
        .input-group input { padding: 12px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-base); color: var(--text-main); outline: none; transition: border 0.3s; font-size: 1rem; }
        .input-group input:focus { border-color: var(--theme-blue); box-shadow: 0 0 5px rgba(51, 136, 255, 0.5); }
        /* ------------------------------------- */

        .sidebar { width: 240px; background-color: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 30px; color: var(--status-ok); letter-spacing: 1px; }
        .nav-menu { list-style: none; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: var(--text-sub); transition: all 0.3s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background-color: rgba(51, 136, 255, 0.1); color: var(--text-main); border-left-color: var(--theme-blue); }

        .main-container { flex: 1; display: flex; flex-direction: column; }
        .header { height: 60px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .sys-info { display: flex; gap: 20px; color: var(--text-sub); font-size: 0.9rem; }
        .sys-info span strong { color: var(--text-main); margin-left: 5px; }
        .user-profile { width: 35px; height: 35px; background-color: var(--theme-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; text-transform: uppercase; }

        #view-dashboard { flex: 1; padding: 20px; display: flex; gap: 20px; }
        .map-section { flex: 7; background-color: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; }
        .panel-title { padding: 15px; font-weight: 600; border-bottom: 1px solid var(--border-color); background-color: var(--bg-card); z-index: 10; }
        #map { flex: 1; width: 100%; }

        .telemetry-section { flex: 3; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 5px; }
        .drone-card { background-color: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); padding: 15px; border-left: 4px solid var(--status-ok); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--border-color); }
        .drone-id { font-weight: bold; font-size: 1.1rem; }
        .status-badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; background-color: rgba(0, 242, 195, 0.1); color: var(--status-ok); }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 3px; }
        .data-value { font-family: monospace; font-size: 1.05rem; }
        .action-btns { margin-top: 15px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px 0; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background-color: var(--theme-blue); color: white; }
        .btn-danger { background-color: rgba(253, 93, 147, 0.2); color: var(--status-err); border: 1px solid var(--status-err); }

        #view-fleet { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .data-table { width: 100%; border-collapse: collapse; background-color: var(--bg-card); border-radius: 8px; overflow: hidden; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table th { background-color: rgba(51, 136, 255, 0.1); color: var(--theme-blue); }
    </style>
</head>
<body>

    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2 class="login-title">UAV COMMAND</h2>
            <div class="input-group">
                <label>操作员代号</label>
                <input type="text" id="username" placeholder="例如: Sensei 或 OP">
            </div>
            <div class="input-group">
                <label>安全密匙</label>
                <input type="password" id="password" placeholder="随便输入什么都可以">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="btn-login">登 录 系 统</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="logo">UAV COMMAND</div>
        <ul class="nav-menu">
            <li class="nav-item active">全局监控大屏</li>
            <li class="nav-item">设备编队管理</li>
            <li class="nav-item">飞行任务规划</li>
        </ul>
    </aside>

    <main class="main-container">
        <header class="header">
            <div class="sys-info">
                <span>系统状态: <strong style="color: var(--status-ok);">运行正常</strong></span>
            </div>
            <div class="user-profile" id="user-avatar">??</div>
        </header>

        <section id="view-dashboard">
            <div class="map-section">
                <div class="panel-title">实时航线轨迹追踪</div>
                <div id="map"></div>
            </div>
            <div class="telemetry-section">
                <div class="drone-card">
                    <div class="card-header">
                        <span class="drone-id">UAV-Alpha-01</span>
                        <span class="status-badge">执行任务中</span>
                    </div>
                    <div class="data-grid">
                        <div class="data-item"><span class="data-label">相对高度</span><span class="data-value">124.5 m</span></div>
                        <div class="data-item"><span class="data-label">飞行速度</span><span class="data-value">12.8 m/s</span></div>
                        <div class="data-item"><span class="data-label">剩余电量</span><span class="data-value" style="color: var(--status-ok);">78%</span></div>
                    </div>
                    <div class="action-btns">
                        <button class="btn btn-primary demo-ptz">云台视角</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-fleet">
            <h2 style="margin-bottom: 20px; font-size: 1.2rem;">设备编队台账</h2>
            <table class="data-table">
                <thead><tr><th>设备编号</th><th>型号</th><th>状态</th></tr></thead>
                <tbody>
                    <tr><td>UAV-Alpha-01</td><td>M300 RTK</td><td><span style="color:var(--status-ok)">任务执行中</span></td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
        // --- 新增：登录逻辑 ---
        const btnLogin = document.getElementById('btn-login');
        btnLogin.addEventListener('click', function() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;

            // 简单的表单验证
            if (usernameInput === '') {
                alert('授权失败：操作员代号不能为空！');
                return;
            }
            if (passwordInput === '') {
                alert('授权失败：请输入安全密匙！');
                return;
            }

            // 登录成功：更新右上角头像的字母（取账号前两个字符）
            document.getElementById('user-avatar').innerText = usernameInput.substring(0, 2);

            // 让遮罩层消失
            const overlay = document.getElementById('login-overlay');
            overlay.style.opacity = '0'; // 先让透明度变0（配合 CSS 里的 transition 实现淡出效果）
            
            // 等待 0.5 秒淡出动画结束后，彻底从页面移除遮罩层，并初始化地图
            setTimeout(() => {
                overlay.style.display = 'none';
                initMap(); // 登录成功后才加载地图
            }, 500);
        });

        // --- 地图初始化函数 ---
        let map; // 提取到外面声明
        function initMap() {
            if(map) return; // 避免重复初始化
            map = L.map('map').setView([20.8449, 106.6881], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: 'Map data &copy; OpenStreetMap',
                maxZoom: 20
            }).addTo(map);

            const droneIcon = L.divIcon({
                html: `<div style="background: #00f2c3; width: 15px; height: 15px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px #00f2c3;"></div>`,
                className: '', iconSize: [15, 15], iconAnchor: [7.5, 7.5]
            });
            const droneMarker = L.marker([20.8500, 106.6900], {icon: droneIcon}).addTo(map).bindPopup('UAV-Alpha-01');

            let lat = 20.8500, lng = 106.6900;
            setInterval(() => {
                lat += (Math.random() - 0.5) * 0.001;
                lng += (Math.random() - 0.5) * 0.001;
                droneMarker.setLatLng([lat, lng]);
            }, 2000);
        }

        // --- 菜单切换逻辑 ---
        const navItems = document.querySelectorAll('.nav-item');
        const viewDashboard = document.getElementById('view-dashboard');
        const viewFleet = document.getElementById('view-fleet');

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                if (this.innerText === '全局监控大屏') {
                    viewDashboard.style.display = 'flex';
                    viewFleet.style.display = 'none';
                    setTimeout(() => { if(map) map.invalidateSize(); }, 100);
                } else if (this.innerText === '设备编队管理') {
                    viewDashboard.style.display = 'none';
                    viewFleet.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
